{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body{
        background:
            linear-gradient(rgba(255,255,255,0.60), rgba(255,255,255,0.60)),
            url("{% static 'images/hospital_bg.jpg' %}");
        background-size: cover;
        background-position: center;
        min-height: 100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }
    .card-box{
        background:white;
        width:450px;
        padding:30px;
        border-radius:20px;
        box-shadow:0 10px 25px rgba(0,0,0,.15);
    }
    h3{
        color:#00695c;
        font-weight:700;
        text-align:center;
        margin-bottom:20px;
    }
</style>
</head>
<body>
<div class="card-box">
<h3>🔑 Change Password</h3>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit"
            class="btn btn-success w-100">
        Save New Password
    </button>
</form>
</div>
</body>
</html>

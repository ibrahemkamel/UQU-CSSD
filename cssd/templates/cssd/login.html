{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login | CSSD System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:
                linear-gradient(rgba(255,255,255,0.60), rgba(255,255,255,0.60)),
                url("{% static 'images/hospital_bg.jpg' %}");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card{
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.18);
        }

        .logo{
            height: 90px;
            width: auto;
        }

        .title{
            color: #00695c;
            font-weight: 700;
        }
    </style>
</head>

<body>

<div class="login-card text-center">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <img src="{% static 'images/hospital_logo.png' %}" class="logo">
        <img src="{% static 'images/company_logo.png' %}" class="logo">
    </div>

    <h3 class="title mb-1">CSSD Tracking System</h3>
    <p class="text-muted mb-4">UMM ALQURA DENTAL TEACHING HOSPITAL</p>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3 text-start">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-4 text-start">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success w-100">
            Login
        </button>
    </form>

    {% if form.errors %}
        <div class="alert alert-danger mt-3">
            Invalid username or password
        </div>
    {% endif %}

    <div class="mt-4 text-muted small">
        Powered by Eng. Ibrahem Kamel
    </div>

</div>

</body>
</html>

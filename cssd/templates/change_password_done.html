{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Password Changed</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:
                linear-gradient(rgba(255,255,255,.7),rgba(255,255,255,.7)),
                url("{% static 'images/hospital_bg.jpg' %}");
            background-size: cover;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card-box{
            background:white;
            padding:40px;
            border-radius:20px;
            width:450px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

        h3{
            color:#00695c;
            font-weight:700;
        }
    </style>
</head>
<body>

<div class="card-box">

    <h3>✅ Password Changed Successfully</h3>

    <p class="mt-3">
        Your password has been updated.
    </p>

    <a href="{% url 'login' %}" class="btn btn-success">
        Back To Login
    </a>

</div>

</body>
</html>
